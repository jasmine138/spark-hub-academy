function toDateStr(d){return d.toISOString().split("T")[0];}
function todayStr(){return toDateStr(new Date());}
function isSchoolDay(d){const w=d.getDay();if(w===0||w===6)return false;return!BREAK_DATES.has(toDateStr(d));}
function getSchoolDayNumber(ds){
  const target=new Date(ds+"T12:00:00"),start=new Date(PROJECT_START+"T12:00:00");
  if(target<start)return 0;
  let count=0;const cur=new Date(start);
  while(cur<=target){if(isSchoolDay(cur))count++;cur.setDate(cur.getDate()+1);}
  return count;
}
function getTodaySchedule(){const n=getSchoolDayNumber(todayStr());if(n===0)return{type:"planning",dayNum:0};return{type:n%2===1?"blog":"vlog",dayNum:n};}
function getRemainingDays(){
  const today=new Date(),end=new Date(PROJECT_END+"T12:00:00");
  let c=0;const cur=new Date(today);
  while(cur<=end){if(isSchoolDay(cur))c++;cur.setDate(cur.getDate()+1);}
  return c;
}
function nextPaycheckDate(){const t=todayStr();return PAYCHECK_DATES.find(d=>d>t)||null;}
function daysUntil(ds){const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(ds+"T00:00:00")-n)/86400000);}
function fmt(n){return"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(s){if(!s)return"";return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

function pendingPaychecks(student){if(!student.job)return[];const t=todayStr();return PAYCHECK_DATES.filter(d=>d<=t&&!student.paycheckDatesReceived.includes(d));}
function applyPaychecks(student,dates){
  if(!dates.length||!student.job)return{student,amount:0};
  const bw=Math.round(student.job.salary/26),total=bw*dates.length;
  const newT=dates.map(d=>({id:"pay_"+d,date:d,type:"income",category:"Paycheck",description:"Bi-weekly paycheck · "+student.job.employer,amount:bw,paycheckDate:d}));
  return{student:{...student,balance:student.balance+total,transactions:[...student.transactions,...newT],paycheckDatesReceived:[...student.paycheckDatesReceived,...dates]},amount:total};
}

function Btn({children,onClick,color=C.cyan,style={},small,outline,disabled}){

  return(
    <button onClick={onClick} disabled={disabled} style={{
      padding:small?"5px 12px":"9px 18px",borderRadius:6,
      background:disabled?"#1a1c28":(outline?bg:color),
      border,
      color:disabled?C.muted:(outline?color:"#fff"),
      fontWeight:600,fontSize:small?12:13,letterSpacing:"0.02em",
      transition:"all 0.15s",opacity:disabled?0.5:1,...style}}>{children}</button>);
}

function PinModal({name,color,onSuccess,onCancel}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);
  const press=d=>{if(pin.length<4)setPin(p=>p+d);};
  const del=()=>setPin(p=>p.slice(0,-1));
  useEffect(()=>{
    if(pin.length===4){
      const ok=onSuccess(pin);
      if(!ok){setError(true);setTimeout(()=>{setPin("");setError(false);},700);}
    }
  },[pin]);
  const dots=Array.from({length:4},(_,i)=>(
    <div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?(error?C.red:color):C.border,border:"2px solid "+(i<pin.length?color:C.border),transition:"all 0.15s"}}/>));
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  return(
    <Modal onClose={onCancel}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🔐</div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{name}</div>
        <div style={{color:C.muted,fontSize:13,marginBottom:24}}>Enter your 4-digit PIN</div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:28}}>{dots}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:240,margin:"0 auto"}}>
          {keys.map((k,i)=>(
            <button key={i} onClick={()=>k==="⌫"?del():k?press(k):null}
              style={{padding:"16px",borderRadius:12,background:k?C.card2:"transparent",border:k?"1px solid "+C.border:"none",color:"#fff",fontSize:20,fontWeight:700,cursor:k?"pointer":"default"}}>
              {k}</button>))}
        </div>
        {error&&<div style={{color:C.red,marginTop:16,fontSize:13,fontWeight:600}}>Incorrect PIN. Try again.</div>}
        <div style={{marginTop:20}}><Btn onClick={onCancel} outline color={C.muted} small>Cancel</Btn></div>
      </div>
    </Modal>);
}

function CareerPanel({student,onUpdate}){
  const th=THEMES[student.themeIdx];
  const [sel,setSel]=useState("");
  const [cTitle,setCTitle]=useState("");
  const [cEmployer,setCEmployer]=useState("");
  const [cSalary,setCSalary]=useState("");
  const [coverLetter,setCoverLetter]=useState("");

  const submitApp=()=>{
    let title,employer,salary;
    if(sel==="custom"){
      if(!cTitle||!cEmployer||!cSalary)return alert("Fill in all fields");
      title=cTitle;employer=cEmployer;salary=parseInt(cSalary);
    } else {
      const[t,e,s]=sel.split("|");title=t;employer=e;salary=parseInt(s);
    }
    onUpdate(s=>({...s,jobApplication:{title,employer,salary,coverLetter,appliedDate:todayStr()},jobStatus:"applied"}));

  if(student.jobStatus==="hired"&&student.job){
    const bw=Math.round(student.job.salary/26);
    return(
      <div style={{display:"grid",gap:14}}>
        <div style={{background:C.card,border:"1px solid "+C.green+"30",borderLeft:"3px solid "+C.green,borderRadius:10,padding:18}}>
          <div style={{fontSize:11,color:C.green,fontWeight:700,letterSpacing:"0.08em",marginBottom:8}}>EMPLOYED</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:2}}>{student.job.title}</div>
          <div style={{color:C.muted,fontSize:14,marginBottom:14}}>{student.job.employer}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[{l:"Annual Salary",v:fmt(student.job.salary),c:"#fff"},{l:"Per Paycheck",v:fmt(bw),c:C.green},{l:"Start Date",v:fmtDate(student.job.startDate),c:C.muted}].map(x=>(
              <div key={x.l} style={{background:C.card2,borderRadius:8,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:4}}>{x.l}</div>
                <div style={{fontSize:14,fontWeight:700,color:x.c}}>{x.v}</div>
              </div>))}
          </div>
        </div>
        <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"14px 18px"}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em"}}>
            Next step: set up your housing and vehicle in the <strong style={{color:th.primary}}>Life</strong> tab →
          </div>
        </div>
      </div>);
  }

  if(student.jobStatus==="applied"){
    return(
      <div style={{display:"grid",gap:14}}>
        <div style={{background:C.card,border:"1px solid "+C.amber+"30",borderLeft:"3px solid "+C.amber,borderRadius:10,padding:18}}>
          <div style={{fontSize:11,color:C.amber,fontWeight:700,letterSpacing:"0.08em",marginBottom:8}}>UNDER REVIEW</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:2}}>{student.jobApplication.title}</div>
          <div style={{color:C.muted,fontSize:13}}>{student.jobApplication.employer} · Applied {fmtDate(student.jobApplication.appliedDate)}</div>
          {student.interviewNotes&&(
            <div style={{marginTop:14,background:C.card2,borderRadius:8,padding:12}}>
              <div style={{fontSize:11,color:C.cyan,fontWeight:600,marginBottom:6,letterSpacing:"0.05em"}}>TEACHER FEEDBACK</div>
              <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{student.interviewNotes}</div>
            </div>)}
        </div>
      </div>);
  }

    return(
      <div style={{display:"grid",gap:14}}>
        <div style={{background:C.card,border:"1px solid "+C.red+"30",borderLeft:"3px solid "+C.red,borderRadius:10,padding:18}}>
          <div style={{fontSize:11,color:C.red,fontWeight:700,letterSpacing:"0.08em",marginBottom:6}}>NOT SELECTED</div>

  return(
    <div style={{display:"grid",gap:14}}>
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Job Application</div>

I am excited to apply because..."}/>

          Transport target: <strong style={{color:C.text}}>under 15%</strong> ({fmt(monthlyIncome*0.15)}/mo)
        </div>
      </div>

      {/* HOUSING */}
      <div style={{background:C.card,border:"1px solid "+C.border,borderLeft:"3px solid "+th.primary,borderRadius:10,padding:18}}>

function VlogsPanel({student,onUpdate}){
  const th=THEMES[student.themeIdx];
  const schedule=getTodaySchedule();
  const liveRef=useRef(null);
  const [stream,setStream]=useState(null);
  const [recorder,setRecorder]=useState(null);
  const [recording,setRecording]=useState(false);
  const [videoURL,setVideoURL]=useState(null);
  const [reflection,setReflection]=useState("");
  const [timer,setTimer]=useState(0);
  const timerRef=useRef(null);

  const start=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
      setStream(s);
      liveRef.current.srcObject=s;
      liveRef.current.play();
      const chunks=[];
      const rec=new MediaRecorder(s);
      rec.ondataavailable=e=>chunks.push(e.data);
      rec.onstop=()=>{const blob=new Blob(chunks,{type:"video/webm"});setVideoURL(URL.createObjectURL(blob));};
      rec.start();setRecorder(rec);setRecording(true);setTimer(0);
      timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);
    }catch{alert("Allow camera access in your browser to record vlogs.");}
  };

  const stop=()=>{
    if(recorder)recorder.stop();
    if(stream)stream.getTracks().forEach(t=>t.stop());
    clearInterval(timerRef.current);
    setRecording(false);
  };

  const download=()=>{const a=document.createElement("a");a.href=videoURL;a.download="vlog_"+todayStr()+".webm";a.click();};

  const save=()=>{
    if(!reflection.trim())return alert("Add a written reflection before saving.");
    onUpdate(s=>({...s,vlogs:[...s.vlogs,{id:"vlog_"+Date.now(),date:todayStr(),reflection,hasVideo:!!videoURL}]}));
    setReflection("");setVideoURL(null);if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);
  };

  const fmtT=s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;

  return(
    <div style={{display:"grid",gap:14}}>
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>Video Journal</div>
            <div style={{fontSize:12,color:C.muted}}>Record yourself talking about your experience — finances, feelings, goals.</div>
          </div>
          <Tag color={schedule.type==="vlog"?C.pink:C.muted}>{schedule.type==="vlog"?"Today: Vlog Day":""}</Tag>
        </div>
      </div>

      {/* Recorder */}
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18}}>
        <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:12}}>CAMERA</div>
        <div style={{position:"relative",marginBottom:14}}>
          <video ref={liveRef} muted style={{width:"100%",maxWidth:520,display:videoURL?"none":"block",minHeight:200,borderRadius:8,background:"#000"}}/>
          {videoURL&&<video src={videoURL} controls style={{width:"100%",maxWidth:520,borderRadius:8}}/>}
          {recording&&(
            <div style={{position:"absolute",top:10,left:10,background:"rgba(0,0,0,0.8)",borderRadius:6,padding:"3px 10px",display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:C.red,boxShadow:"0 0 6px "+C.red}}/>
              <span style={{color:"#fff",fontSize:12,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{fmtT(timer)}</span>
            </div>)}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          {!recording&&!videoURL&&<Btn onClick={start} color={th.primary}>Start Recording</Btn>}
          {recording&&<Btn onClick={stop} color={C.red}>Stop</Btn>}
          {videoURL&&(
            <>
              <Btn onClick={download} color={C.green} outline>Download Video</Btn>
              <Btn onClick={()=>{setVideoURL(null);}} outline color={C.muted} small>Re-record</Btn>
            </>)}
        </div>
        <Inp label="Written Reflection (required to save)" value={reflection} onChange={setReflection} multiline rows={4}
          placeholder="What happened this week? How are you feeling about your money situation? What's your plan?"/>
        <Btn onClick={save} color={th.primary} disabled={!reflection.trim()} style={{width:"100%",padding:"11px"}}>Save Entry</Btn>
      </div>

      {/* Past entries */}
      {student.vlogs.length>0&&(
        <div>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:10,padding:"0 2px"}}>PAST ENTRIES — {student.vlogs.length} total</div>
          {[...student.vlogs].reverse().map(v=>(
            <div key={v.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:16,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:11,color:C.muted}}>{fmtDate(v.date)}</div>
                {v.hasVideo&&<Tag color={C.pink}>Video saved</Tag>}
              </div>
              <div style={{fontSize:13,color:C.text,lineHeight:1.7}}>{v.reflection}</div>
            </div>))}
        </div>)}
    </div>);
}

function ShareProgress({student}){
  const th=THEMES[student.themeIdx];
  const [copied,setCopied]=useState(false);
  const [showCode,setShowCode]=useState(false);
  const generateCode=()=>{
    try{
      const data={student,exportedAt:new Date().toISOString(),version:3};
      return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }catch{return "";}
  };
  const code=generateCode();
  const copy=()=>{
    navigator.clipboard.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),3000);}).catch(()=>{const el=document.createElement("textarea");el.value=code;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);setCopied(true);setTimeout(()=>setCopied(false),3000);});
  };
  return(
    <div style={{display:"grid",gap:16}}>
      <Card color={th.primary}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>📤 Share Progress with Ms. J</div>
        <div style={{color:C.muted,fontSize:13,lineHeight:1.6}}>Generate a progress code and paste it in Google Classroom so Ms. J can view your full dashboard from her device!</div>
      </Card>
      <Card>
        <div style={{textAlign:"center",padding:"8px 0 16px"}}>
          <div style={{fontSize:52,marginBottom:12}}>🔗</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Your Progress Code</div>
          <div style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:20}}>
            Click Generate, then copy the code.<br/>
            Paste it as a <strong style={{color:th.primary}}>Google Classroom comment</strong> or private message to Ms. J.
          </div>
          {!showCode?(
            <Btn onClick={()=>setShowCode(true)} color={th.primary} style={{width:"100%",padding:"14px",fontSize:15}}>
              ✨ Generate My Progress Code
            </Btn>
          ):(
            <div>
              <div style={{background:C.card2,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:14,wordBreak:"break-all",fontSize:11,color:C.muted,fontFamily:"monospace",maxHeight:120,overflowY:"auto",textAlign:"left"}}>
                {code.substring(0,200)}...
              </div>
              <Btn onClick={copy} color={copied?C.green:th.primary} style={{width:"100%",padding:"14px",fontSize:15}}>
                {copied?"✅ Copied to Clipboard!":"📋 Copy Full Code"}
              </Btn>
              {copied&&<div style={{color:C.green,fontSize:13,marginTop:10,fontWeight:600}}>Paste this in Google Classroom — Ms. J can load it instantly! 🎉</div>}
            </div>)}
        </div>
      </Card>
      <Card>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:C.muted}}>📋 How to share:</div>
        {["1. Click Generate My Progress Code above","2. Click Copy Full Code","3. Go to your Google Classroom","4. Comment or message Ms. J and paste the code","5. She'll paste it in her Teacher Dashboard to see your full data!"].map((step,i)=>(
          <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:th.primary+"33",border:"1px solid "+th.primary+"55",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:th.primary,flexShrink:0}}>{i+1}</div>
            <div style={{fontSize:13,color:"#ccc",lineHeight:1.5}}>{step.substring(2)}</div>
          </div>))}
      </Card>
    </div>);
}

function StudentImportPanel({state,save}){
  const [code,setCode]=useState("");
  const [loaded,setLoaded]=useState(null);
  const [error,setError]=useState("");
  const loadCode=()=>{
    try{
      setError("");
      const decoded=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      if(!decoded.student||decoded.version!==3)throw new Error("Invalid code");
      setLoaded(decoded);
    }catch{setError("Invalid code. Make sure the student copied the full code.");}
  };
  const mergeStudent=()=>{
    if(!loaded)return;
    const incoming=loaded.student;
    const exists=state.students.find(s=>s.id===incoming.id);
    if(exists){
      save({...state,students:state.students.map(s=>s.id===incoming.id?{...incoming}:s)});
    }
    alert("Student data loaded! Go to Overview to see their full progress.");
    setCode("");setLoaded(null);
  };
  return(
    <div style={{display:"grid",gap:16}}>
      <Card color={C.pink}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>📥 Load Student Progress</div>

        <Inp label="Paste Student Progress Code" value={code} onChange={setCode} multiline rows={5} placeholder="Paste the full code the student copied from their Share Progress tab..."/>

        <Btn onClick={loadCode} color={C.pink} disabled={!code.trim()} style={{width:"100%"}}>🔍 Load Student Data</Btn>

        const s=loaded.student;const th=THEMES[s.themeIdx];

          <Card color={C.green}>
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>

                <div>

                  <div style={{color:C.muted,fontSize:13}}>Exported {loaded.exportedAt?new Date(loaded.exportedAt).toLocaleString():""}</div>

                <div style={{background:C.card2,borderRadius:10,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600}}>JOB STATUS</div>
                  <div style={{fontSize:13,fontWeight:700,color:s.jobStatus==="hired"?C.green:C.amber}}>{s.jobStatus==="hired"?(s.job?s.job.title:""):"Not hired yet"}</div>

                <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:8}}>LATEST BLOG RESPONSE</div>
                <div style={{background:C.card2,borderRadius:10,padding:12}}>
                  {s.blogResponses[s.blogResponses.length-1].question&&<div style={{fontSize:12,color:C.cyan,marginBottom:6,fontStyle:"italic"}}>"{s.blogResponses[s.blogResponses.length-1].question}"</div>}
                  <div style={{fontSize:13,color:"#ddd",lineHeight:1.6}}>{s.blogResponses[s.blogResponses.length-1].response}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:6}}>{s.blogResponses[s.blogResponses.length-1].mood} {fmtDate(s.blogResponses[s.blogResponses.length-1].date)}</div>
                </div>
              </div>)}
            {(s.vlogs&&s.vlogs.length>0)&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:8}}>LATEST VLOG REFLECTION</div>
                <div style={{background:C.card2,borderRadius:10,padding:12}}>
                  <div style={{fontSize:13,color:"#ddd",lineHeight:1.6}}>{s.vlogs[s.vlogs.length-1].reflection}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:6}}>{fmtDate(s.vlogs[s.vlogs.length-1].date)}</div>
                </div>
              </div>)}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Btn onClick={mergeStudent} color={C.green} style={{padding:"12px"}}>✅ Save to My Dashboard</Btn>
              <Btn onClick={()=>{setLoaded(null);setCode("");}} outline color={C.muted} style={{padding:"12px"}}>Clear</Btn>
            </div>
          </Card>);})()} 
    </div>);
}

function App(){
  const [state,setState]=useState(loadState);
  const [user,setUser]=useState(null);
  const [paycheckAlert,setPaycheckAlert]=useState(null);
  const save=useCallback(ns=>{setState(ns);saveState(ns);},[]);
  const updateStudent=useCallback((id,updater)=>{setState(prev=>{const next={...prev,students:prev.students.map(s=>s.id===id?updater(s):s)};saveState(next);return next;});},[]);
  const loginStudent=useCallback(student=>{
    setState(prev=>{
      const latest=prev.students.find(s=>s.id===student.id)||student;
      const due=pendingPaychecks(latest);
      if(due.length>0){
        const{student:updated,amount}=applyPaychecks(latest,due);
        const next={...prev,students:prev.students.map(s=>s.id===updated.id?updated:s)};
        saveState(next);
        setPaycheckAlert({amount});
        return next;
      }
      return prev;
    });
    setUser({role:"student",studentId:student.id});
  },[]);
  if(!user)return<LoginScreen state={state} onTeacherLogin={()=>setUser({role:"teacher"})} onStudentLogin={loginStudent}/>;
  if(user.role==="teacher")return<TeacherDashboard state={state} save={save} onLogout={()=>setUser(null)}/>;
  const currentStudent=state.students.find(s=>s.id===user.studentId);
  if(!currentStudent){setUser(null);return null;}
  return<StudentDashboard student={currentStudent} state={state} paycheckAlert={paycheckAlert} onClearAlert={()=>setPaycheckAlert(null)} onUpdate={updater=>updateStudent(currentStudent.id,updater)} onLogout={()=>setUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
